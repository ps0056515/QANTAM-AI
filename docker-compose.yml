version: '3.8'

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://qantam:qantam@postgres:5432/qantam
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=qantam123
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=qantam
      - MINIO_SECRET_KEY=qantam123
      - MEILISEARCH_URL=http://meilisearch:7700
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./apps/api:/app
    depends_on:
      - postgres
      - neo4j
      - redis
      - minio
      - meilisearch
    networks:
      - qantam-net
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    networks:
      - qantam-net
    command: npm run dev

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=qantam
      - POSTGRES_PASSWORD=qantam
      - POSTGRES_DB=qantam
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - qantam-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qantam"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    environment:
      - NEO4J_AUTH=neo4j/qantam123
      - NEO4J_PLUGINS=["apoc"]
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - qantam-net
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - qantam-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=qantam
      - MINIO_ROOT_PASSWORD=qantam123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - qantam-net

  meilisearch:
    image: getmeili/meilisearch:v1.6
    environment:
      - MEILI_ENV=development
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - qantam-net

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - qantam-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

networks:
  qantam-net:
    driver: bridge

volumes:
  postgres_data:
  neo4j_data:
  redis_data:
  minio_data:
  meilisearch_data:
  ollama_data:
