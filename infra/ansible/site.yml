---
- name: Base server setup
  hosts: all
  become: yes
  roles:
    - base

- name: K3s server (production)
  hosts: prod
  become: yes
  roles:
    - k3s-server
    - ssl

- name: K3s agent (staging)
  hosts: staging
  become: yes
  roles:
    - k3s-agent
    - ssl

- name: Monitoring stack
  hosts: monitoring
  become: yes
  roles:
    - docker
