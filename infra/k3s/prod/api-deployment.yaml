apiVersion: apps/v1
kind: Deployment
metadata:
  name: qantam-api
  namespace: qantam-prod
  labels:
    app: qantam-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: qantam-api
  template:
    metadata:
      labels:
        app: qantam-api
    spec:
      containers:
        - name: api
          image: ghcr.io/testyatra/qantam-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: qantam-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: qantam-api
  namespace: qantam-prod
spec:
  selector:
    app: qantam-api
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
