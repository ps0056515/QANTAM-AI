apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: qantam-api-hpa
  namespace: qantam-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: qantam-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: qantam-web-hpa
  namespace: qantam-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: qantam-web
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
