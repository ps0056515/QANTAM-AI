apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qantam-ingress
  namespace: qantam-prod
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  tls:
    - hosts:
        - qantam.ai
        - api.qantam.ai
      secretName: qantam-tls
  rules:
    - host: qantam.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: qantam-web
                port:
                  number: 3000
    - host: api.qantam.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: qantam-api
                port:
                  number: 8000
