apiVersion: v1
kind: Secret
metadata:
  name: qantam-secrets
  namespace: qantam-prod
type: Opaque
stringData:
  DATABASE_URL: "postgresql://qantam:CHANGE_ME@postgres:5432/qantam"
  NEO4J_URI: "bolt://neo4j:7687"
  NEO4J_USER: "neo4j"
  NEO4J_PASSWORD: "CHANGE_ME"
  REDIS_URL: "redis://redis:6379"
  JWT_SECRET: "CHANGE_ME_GENERATE_SECURE_SECRET"
  ANTHROPIC_API_KEY: "CHANGE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: qantam-prod
type: Opaque
stringData:
  POSTGRES_USER: "qantam"
  POSTGRES_PASSWORD: "CHANGE_ME"
  POSTGRES_DB: "qantam"
---
apiVersion: v1
kind: Secret
metadata:
  name: neo4j-secrets
  namespace: qantam-prod
type: Opaque
stringData:
  NEO4J_AUTH: "neo4j/CHANGE_ME"
