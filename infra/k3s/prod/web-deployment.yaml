apiVersion: apps/v1
kind: Deployment
metadata:
  name: qantam-web
  namespace: qantam-prod
  labels:
    app: qantam-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: qantam-web
  template:
    metadata:
      labels:
        app: qantam-web
    spec:
      containers:
        - name: web
          image: ghcr.io/testyatra/qantam-web:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.qantam.ai"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: qantam-web
  namespace: qantam-prod
spec:
  selector:
    app: qantam-web
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
